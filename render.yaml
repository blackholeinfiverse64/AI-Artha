services:
  - type: web
    name: ai-uploader-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/start_server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: MONGO_URI
        fromSecret: MONGO_URI
      - key: JWT_SECRET_KEY
        fromSecret: JWT_SECRET_KEY
      - key: SENTRY_DSN
        fromSecret: SENTRY_DSN
      - key: POSTHOG_API_KEY
        fromSecret: POSTHOG_API_KEY
      - key: POSTHOG_HOST
        value: https://us.posthog.com
      - key: BHIV_LM_URL
        value: https://api.perplexity.ai
      - key: BHIV_STORAGE_BACKEND
        value: local
      - key: ENVIRONMENT
        value: production
      - key: ENABLE_PERFORMANCE_MONITORING
        value: "true"
      - key: ENABLE_USER_ANALYTICS
        value: "true"
      - key: ENABLE_ERROR_REPORTING
        value: "true"
